spring:
  application:
    name: IF-2050
  datasource:
    url: jdbc:postgresql://localhost:5432/${DB_NAME:DONEATEdb}
    username: ${DB_USERNAME:admin}
    password: ${DB_PASSWORD:password}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect